<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給与見込み計算</title>
<style>
body{font-family:sans-serif;max-width:900px;margin:20px auto;padding:10px;background:#f5f5f5;}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;}
input,select{padding:8px;margin:5px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
.weekend{background:#eee;}
</style>
</head>
<body>

<h1>給与見込み計算</h1>

<div class="card">
<label>基本給</label>
<input type="number" id="baseSalary">
<label>所定労働時間</label>
<input type="number" id="scheduledHours">
<button onclick="generateTable()">勤務表リセット</button>
</div>

<div class="card">
<table>
<thead><tr><th>日付</th><th>曜日</th><th>退勤</th></tr></thead>
<tbody id="workTable"></tbody>
</table>
</div>

<div class="card">
<label>住民税（月）</label>
<input type="number" id="residentTax" value="0">
<br>
<label>等級選択</label>
<select id="grade">
    <option value="auto">自動計算</option>
</select>
</div>

<div class="card">
<div>時間単価：<span id="hourly">0</span></div>
<div>残業時間：<span id="otTime">0</span></div>
<div>残業代：<span id="otPay">0</span></div>
<hr>
<div>額面：<span id="gross">0</span></div>
<hr>
<div>健康保険：<span id="health">0</span></div>
<div>厚生年金：<span id="pension">0</span></div>
<div>雇用保険：<span id="employment">0</span></div>
<div>社保合計：<span id="social">0</span></div>
<div>所得税：<span id="income">0</span></div>
<div>住民税：<span id="resident">0</span></div>
<h2>手取り：<span id="net">0</span></h2>
</div>

<script>
const TABLE = [
    {min: 58000, health: 2994, pension: 8235},    // 8.8万以下
    {min: 63000, health: 3194, pension: 8784},    // 9.3万
    {min: 73000, health: 3593, pension: 9699},    // 10.4万
    {min: 83000, health: 3992, pension: 10614},   // 11.6万
    {min: 93000, health: 4391, pension: 11529},   // 12.6万
    {min: 101000, health: 4790, pension: 12444},  // 13.8万
    {min: 107000, health: 5189, pension: 13359},  // 15.0万
    {min: 114000, health: 5589, pension: 14274},  // 16.2万
    {min: 122000, health: 5988, pension: 15189},  // 17.4万
    {min: 130000, health: 6587, pension: 16562},  // 19.0万
    {min: 138000, health: 7185, pension: 18398},  // 21.0万
    {min: 146000, health: 7784, pension: 20234},  // 23.0万
    {min: 155000, health: 8383, pension: 22070},  // 25.0万
    {min: 165000, health: 8982, pension: 23906},  // 27.0万
    {min: 175000, health: 9581, pension: 25742},  // 29.0万
    {min: 185000, health: 10180, pension: 27578}, // 31.0万
    {min: 195000, health: 10778, pension: 29414}, // 33.0万
    {min: 210000, health: 11377, pension: 31250}, // 35.0万
    {min: 230000, health: 12375, pension: 33086}, // 37.0万
    {min: 250000, health: 13373, pension: 36758}, // 41.0万
    {min: 270000, health: 14371, pension: 40430}, // 45.0万
    {min: 290000, health: 15369, pension: 44102}, // 49.0万
    {min: 310000, health: 16367, pension: 47774}, // 53.0万
    {min: 330000, health: 17365, pension: 51446}, // 57.0万
    {min: 350000, health: 18363, pension: 55118}, // 61.0万
    {min: 370000, health: 19361, pension: 58790}, // 65.0万
    {min: 395000, health: 20359, pension: 62462}, // 69.0万
    {min: 425000, health: 21357, pension: 66134}, // 73.0万
    {min: 455000, health: 22854, pension: 71642}, // 79.0万
    {min: 485000, health: 24351, pension: 77150}, // 85.0万
    {min: 515000, health: 25848, pension: 82658}, // 91.0万
    {min: 545000, health: 27345, pension: 88166}, // 97.0万
    {min: 575000, health: 28842, pension: 93674}, // 103.0万
    {min: 605000, health: 30339, pension: 99182}, // 109.0万
    {min: 635000, health: 31836, pension: 104690} // 115.0万
];

// 等級選択肢の初期化
function initGradeSelect() {
    const sel = document.getElementById("grade");
    TABLE.forEach((item, index) => {
        const opt = document.createElement("option");
        opt.value = index;
        opt.textContent = `等級${index + 1} (給与目安: ${item.min}〜)`;
        sel.appendChild(opt);
    });
}

function getGrade(gross){
    for(let i=TABLE.length-1;i>=0;i--){
        if(gross>=TABLE[i].min) return TABLE[i];
    }
    return TABLE[0];
}

function calc(){
    const base = parseFloat(document.getElementById("baseSalary").value) || 0;
    const sched = parseFloat(document.getElementById("scheduledHours").value) || 0;
    if(base === 0 || sched === 0) return;

    const hourly = base / sched;
    let ot = 0;
    document.querySelectorAll(".t").forEach(i=>{
        if(!i.value) return;
        const [h,m] = i.value.split(":").map(Number);
        const end = h * 60 + m;
        if(end > 1080) ot += (end - 1080);
    });

    const otPay = hourly * 1.25 * ot / 60;
    const gross = base + otPay;
    
    // 等級判定（手動選択があればそれを優先）
    const gradeVal = document.getElementById("grade").value;
    const grade = (gradeVal === "auto") ? getGrade(gross) : TABLE[gradeVal];

    const health = grade.health;
    const pension = grade.pension;
    const employment = gross * 0.006;
    const social = health + pension + employment;
    const income = Math.round(gross * 0.035 / 12);
    const resident = parseFloat(document.getElementById("residentTax").value) || 0;
    const net = gross - social - income - resident;

    document.getElementById("hourly").textContent = Math.round(hourly);
    document.getElementById("otTime").textContent = `${Math.floor(ot/60)}h${ot%60}m`;
    document.getElementById("otPay").textContent = Math.round(otPay);
    document.getElementById("gross").textContent = Math.round(gross);
    document.getElementById("health").textContent = Math.round(health);
    document.getElementById("pension").textContent = Math.round(pension);
    document.getElementById("employment").textContent = Math.round(employment);
    document.getElementById("social").textContent = Math.round(social);
    document.getElementById("income").textContent = Math.round(income);
    document.getElementById("resident").textContent = Math.round(resident);
    document.getElementById("net").textContent = Math.round(net);
}

function generateTable(){
    const y=2026, m=6;
    const start=new Date(y,m-1,21), end=new Date(y,m,20);
    const workTable = document.getElementById("workTable");
    workTable.innerHTML="";
    for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
        const tr=document.createElement("tr");
        const w=d.getDay();
        if(w===0||w===6) tr.classList.add("weekend");
        tr.innerHTML=`<td>${d.getMonth()+1}/${d.getDate()}</td><td>${["日","月","火","水","木","金","土"][w]}</td><td><input type="time" class="t"></td>`;
        workTable.appendChild(tr);
    }
    document.querySelectorAll(".t").forEach(i=>i.oninput=calc);
}

// 初期設定
initGradeSelect();
document.getElementById("baseSalary").oninput = calc;
document.getElementById("scheduledHours").oninput = calc;
document.getElementById("residentTax").oninput = calc;
document.getElementById("grade").onchange = calc;
generateTable();
</script>
</body>
</html>
