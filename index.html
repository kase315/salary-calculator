<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給与見込み計算</title>

<style>
body {
    font-family: sans-serif;
    max-width: 900px;
    margin: 20px auto;
    padding: 10px;
    background: #f5f5f5;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

input, select {
    padding: 8px;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

.weekend {
    background: #eee;
}

.summary div {
    margin: 8px 0;
}
</style>
</head>

<body>

<h1>給与見込み計算</h1>

<div class="card">

    <label>支給年</label>
    <select id="payYear"></select>

    <label>支給月</label>
    <select id="payMonth"></select>

    <br>

    <label>基本給</label>
    <input type="number" id="baseSalary">

    <label>所定労働時間</label>
    <input type="number" id="scheduledHours">

    <button onclick="generateTable()">勤務表生成</button>

    <p id="period"></p>

</div>

<div class="card">
    <table>
        <thead>
        <tr>
            <th>日付</th>
            <th>曜日</th>
            <th>退勤</th>
        </tr>
        </thead>
        <tbody id="workTable"></tbody>
    </table>
</div>

<div class="card summary">

    <div>時間単価：<span id="hourlyRate">0</span>円</div>
    <div>残業代：<span id="overtimePay">0</span>円</div>

    <h2>額面：<span id="grossSalary">0</span>円</h2>

</div>

<div class="card">

    <h3>税金・社会保険</h3>

    <div>所得税：<span id="incomeTax">0</span>円</div>

    <div>住民税（入力）：
        <input type="number" id="residentTax" value="0">
    </div>

    <div>社会保険（入力）：
        <input type="number" id="socialInsurance" value="0">
    </div>

</div>

<div class="card summary">
    <h2>手取り：<span id="netSalary">0</span>円</h2>
</div>

<script>

const WEEKDAYS = ['日','月','火','水','木','金','土'];

function initSelectors() {

    const y = document.getElementById('payYear');
    const m = document.getElementById('payMonth');

    const now = new Date().getFullYear();

    for (let i = now - 1; i <= now + 1; i++) {
        y.innerHTML += `<option value="${i}">${i}</option>`;
    }

    for (let i = 1; i <= 12; i++) {
        m.innerHTML += `<option value="${i}">${i}</option>`;
    }

    y.value = now;
    m.value = new Date().getMonth() + 1;
}

function generateTable() {

    const year = Number(document.getElementById('payYear').value);
    const month = Number(document.getElementById('payMonth').value);

    const start = new Date(year, month - 3, 21);
    const end = new Date(year, month - 2, 20);

    document.getElementById('period').textContent =
        `${start.toLocaleDateString()} ～ ${end.toLocaleDateString()}`;

    const tbody = document.getElementById('workTable');
    tbody.innerHTML = '';

    let d = new Date(start);

    while (d <= end) {

        const tr = document.createElement('tr');
        const w = d.getDay();

        if (w === 0 || w === 6) tr.classList.add('weekend');

        const key = `${d.getMonth()+1}/${d.getDate()}`;

        tr.innerHTML = `
            <td>${key}</td>
            <td>${WEEKDAYS[w]}</td>
            <td><input type="time" class="endTime"></td>
        `;

        tbody.appendChild(tr);
        d.setDate(d.getDate() + 1);
    }

    document.querySelectorAll('.endTime')
        .forEach(i => i.addEventListener('input', calculate));

    calculate();
}

function salaryDeduction(annual) {

    if (annual <= 1625000) return 550000;
    if (annual <= 1800000) return annual * 0.4 - 100000;
    if (annual <= 3600000) return annual * 0.3 + 80000;
    if (annual <= 6600000) return annual * 0.2 + 440000;
    if (annual <= 8500000) return annual * 0.1 + 1100000;

    return 1950000;
}

function incomeTaxCalc(annual) {

    const taxable = Math.max(0, annual - salaryDeduction(annual));

    let tax = 0;

    if (taxable <= 1950000) {
        tax = taxable * 0.05;
    } else if (taxable <= 3300000) {
        tax = taxable * 0.10 - 97500;
    } else if (taxable <= 6950000) {
        tax = taxable * 0.20 - 427500;
    } else if (taxable <= 9000000) {
        tax = taxable * 0.23 - 636000;
    } else if (taxable <= 18000000) {
        tax = taxable * 0.33 - 1536000;
    } else {
        tax = taxable * 0.40 - 2796000;
    }

    return Math.max(0, tax);
}

function calculate() {

    const base = Number(document.getElementById('baseSalary').value);
    const hours = Number(document.getElementById('scheduledHours').value);

    if (!base || !hours) return;

    const hourly = base / hours;

    let overtimeMinutes = 0;

    document.querySelectorAll('.endTime').forEach(i => {

        if (!i.value) return;

        const [h,m] = i.value.split(':').map(Number);
        const end = h*60+m;

        const otStart = 18*60;

        if (end > otStart) {
            overtimeMinutes += end - otStart;
        }
    });

    const overtimePay = hourly * 1.25 * (overtimeMinutes/60);

    const gross = base + overtimePay;

    const annual = gross * 12;

    const social = Number(document.getElementById('socialInsurance').value || 0);
    const resident = Number(document.getElementById('residentTax').value || 0);

    const incomeTax = incomeTaxCalc(annual) / 12;

    const net =
        gross - social - incomeTax - resident;

    document.getElementById('hourlyRate').textContent = Math.round(hourly);
    document.getElementById('overtimePay').textContent = Math.round(overtimePay);
    document.getElementById('grossSalary').textContent = Math.round(gross);

    document.getElementById('incomeTax').textContent = Math.round(incomeTax);
    document.getElementById('netSalary').textContent = Math.round(net);
}

document.getElementById('baseSalary').addEventListener('input', calculate);
document.getElementById('scheduledHours').addEventListener('input', calculate);
document.getElementById('residentTax').addEventListener('input', calculate);
document.getElementById('socialInsurance').addEventListener('input', calculate);

initSelectors();
generateTable();

</script>

</body>
</html>
