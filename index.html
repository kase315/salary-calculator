```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給与見込み計算</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 20px auto;
    padding: 15px;
    background: #f5f5f5;
}

h1 {
    text-align: center;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 15px;
}

input {
    padding: 8px;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

.weekend {
    background: #e0e0e0;
}

.summary {
    font-size: 18px;
    line-height: 1.8;
}

button {
    padding: 10px 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>給与見込み計算</h1>

<div class="card">
    <label>基本給（円）
        <input type="number" id="baseSalary" value="300000">
    </label>

    <label>所定労働時間（月）
        <input type="number" id="scheduledHours" value="160">
    </label>

    <button onclick="generateDays()">今月の日付を生成</button>
</div>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>日付</th>
                <th>曜日</th>
                <th>退勤時刻</th>
            </tr>
        </thead>
        <tbody id="workTable"></tbody>
    </table>
</div>

<div class="card summary">
    <div>時間単価：<span id="hourlyRate">0</span> 円</div>

    <div>割増なし時間：<span id="normalTime">0時間0分</span></div>
    <div>割増なし残業代：<span id="normalPay">0</span> 円</div>

    <div>割増対象時間：<span id="overtimeTime">0時間0分</span></div>
    <div>割増対象残業代：<span id="overtimePay">0</span> 円</div>

    <hr>

    <div>総残業代：<span id="totalOvertimePay">0</span> 円</div>

    <h2>額面給与：<span id="grossSalary">0</span> 円</h2>
</div>

<script>
const WEEKDAYS = ['日','月','火','水','木','金','土'];

function generateDays() {
    const tbody = document.getElementById('workTable');
    tbody.innerHTML = '';

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const lastDay = new Date(year, month + 1, 0).getDate();

    for (let day = 1; day <= lastDay; day++) {
        const date = new Date(year, month, day);
        const weekday = date.getDay();

        const tr = document.createElement('tr');

        if (weekday === 0 || weekday === 6) {
            tr.classList.add('weekend');
        }

        tr.innerHTML = `
            <td>${month + 1}/${day}</td>
            <td>${WEEKDAYS[weekday]}</td>
            <td>
                <input type="time"
                       class="endTime"
                       data-day="${day}">
            </td>
        `;

        tbody.appendChild(tr);
    }

    loadData();

    document.querySelectorAll('.endTime').forEach(input => {
        input.addEventListener('change', () => {
            saveData();
            calculate();
        });
    });

    calculate();
}

function calculate() {

    const baseSalary =
        Number(document.getElementById('baseSalary').value);

    const scheduledHours =
        Number(document.getElementById('scheduledHours').value);

    const hourlyRate =
        baseSalary / scheduledHours;

    let normalMinutes = 0;
    let overtimeMinutes = 0;

    document.querySelectorAll('.endTime').forEach(input => {

        const time = input.value;

        if (!time) return;

        const [h, m] = time.split(':').map(Number);

        const endMinutes = h * 60 + m;

        const normalStart = 17 * 60 + 45;
        const overtimeStart = 18 * 60;

        if (endMinutes > normalStart) {

            normalMinutes +=
                Math.min(endMinutes, overtimeStart)
                - normalStart;
        }

        if (endMinutes > overtimeStart) {

            overtimeMinutes +=
                endMinutes - overtimeStart;
        }
    });

    normalMinutes = Math.max(normalMinutes, 0);

    const normalPay =
        hourlyRate * (normalMinutes / 60);

    const overtimePay =
        hourlyRate * 1.25 * (overtimeMinutes / 60);

    const totalOvertimePay =
        normalPay + overtimePay;

    const grossSalary =
        baseSalary + totalOvertimePay;

    document.getElementById('hourlyRate')
        .textContent =
        Math.round(hourlyRate).toLocaleString();

    document.getElementById('normalTime')
        .textContent =
        `${Math.floor(normalMinutes / 60)}時間${normalMinutes % 60}分`;

    document.getElementById('normalPay')
        .textContent =
        Math.round(normalPay).toLocaleString();

    document.getElementById('overtimeTime')
        .textContent =
        `${Math.floor(overtimeMinutes / 60)}時間${overtimeMinutes % 60}分`;

    document.getElementById('overtimePay')
        .textContent =
        Math.round(overtimePay).toLocaleString();

    document.getElementById('totalOvertimePay')
        .textContent =
        Math.round(totalOvertimePay).toLocaleString();

    document.getElementById('grossSalary')
        .textContent =
        Math.round(grossSalary).toLocaleString();

    saveData();
}

function saveData() {

    const data = {
        baseSalary:
            document.getElementById('baseSalary').value,

        scheduledHours:
            document.getElementById('scheduledHours').value,

        times: {}
    };

    document.querySelectorAll('.endTime').forEach(input => {
        data.times[input.dataset.day] = input.value;
    });

    localStorage.setItem(
        'salaryCalculator',
        JSON.stringify(data)
    );
}

function loadData() {

    const saved =
        localStorage.getItem('salaryCalculator');

    if (!saved) return;

    const data = JSON.parse(saved);

    document.getElementById('baseSalary').value =
        data.baseSalary || '';

    document.getElementById('scheduledHours').value =
        data.scheduledHours || '';

    document.querySelectorAll('.endTime').forEach(input => {

        input.value =
            data.times[input.dataset.day] || '';
    });
}

document.getElementById('baseSalary')
    .addEventListener('input', calculate);

document.getElementById('scheduledHours')
    .addEventListener('input', calculate);

generateDays();
</script>

</body>
</html>
