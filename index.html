<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給与見込み計算（千葉支部版）</title>
<style>
body{font-family:sans-serif;max-width:900px;margin:20px auto;padding:10px;background:#f5f5f5;}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;}
input,select{padding:8px;margin:5px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
.weekend{background:#eee;}
</style>
</head>
<body>

<h1>給与見込み計算</h1>

<div class="card">
<label>基本給</label>
<input type="number" id="baseSalary">
<label>所定労働時間</label>
<input type="number" id="scheduledHours">
<button onclick="generateTable()">勤務表リセット</button>
</div>

<div class="card">
<table>
<thead><tr><th>日付</th><th>曜日</th><th>退勤</th></tr></thead>
<tbody id="workTable"></tbody>
</table>
</div>

<div class="card">
<label>住民税（月）</label>
<input type="number" id="residentTax" value="0">
<br>
<label>等級選択</label>
<select id="grade">
    <option value="auto">自動計算</option>
</select>
</div>

<div class="card">
<div>時間単価：<span id="hourly">0</span></div>
<div>残業時間：<span id="otTime">0</span></div>
<div>残業代：<span id="otPay">0</span></div>
<hr>
<div>額面：<span id="gross">0</span></div>
<hr>
<div>健康保険：<span id="health">0</span></div>
<div>厚生年金：<span id="pension">0</span></div>
<div>雇用保険：<span id="employment">0</span></div>
<div>社保合計：<span id="social">0</span></div>
<div>所得税：<span id="income">0</span></div>
<div>住民税：<span id="resident">0</span></div>
<h2>手取り：<span id="net">0</span></h2>
</div>

<script>
// ご提示いただいた千葉支部テーブルを反映（折半額）
const TABLE=[
    {min:58000, health:2822, pension:8052}, {min:63000, health:3308, pension:8967},
    {min:73000, health:3795, pension:9516}, {min:83000, health:4281, pension:10065},
    {min:93000, health:4768, pension:10797}, {min:101000, health:5060, pension:11529},
    {min:107000, health:5352, pension:12261}, {min:114000, health:5741, pension:12993},
    {min:122000, health:6130, pension:13725}, {min:130000, health:6519, pension:14640},
    {min:138000, health:6908, pension:15555}, {min:146000, health:7298, pension:16470},
    {min:155000, health:7784, pension:17385}, {min:165000, health:8271, pension:18300},
    {min:175000, health:8757, pension:19295}, {min:185000, health:9244, pension:20130},
    {min:195000, health:9730, pension:21960}, {min:210000, health:10703, pension:23790},
    {min:230000, health:11676, pension:25620}, {min:250000, health:12649, pension:27450},
    {min:270000, health:13622, pension:29280}, {min:290000, health:14595, pension:31110},
    {min:310000, health:15568, pension:32940}, {min:330000, health:16541, pension:34770},
    {min:350000, health:17514, pension:37515}, {min:370000, health:18487, pension:40260},
    {min:395000, health:19947, pension:43005}, {min:425000, health:21406, pension:45750},
    {min:455000, health:22866, pension:48495}, {min:485000, health:24325, pension:51240},
    {min:515000, health:25785, pension:53985}, {min:545000, health:27244, pension:56730},
    {min:575000, health:28704, pension:59475}, {min:605000, health:30163, pension:61000},
    {min:635000, health:31623, pension:63000}, {min:665000, health:33082, pension:65000},
    {min:695000, health:34542, pension:67000}, {min:730000, health:36488, pension:69000},
    {min:770000, health:38434, pension:72000}, {min:810000, health:40380, pension:75000},
    {min:855000, health:42812, pension:78000}, {min:905000, health:45245, pension:81000},
    {min:955000, health:47677, pension:84000}, {min:1005000, health:50110, pension:87000},
    {min:1055000, health:53029, pension:90000}, {min:1115000, health:55948, pension:93000},
    {min:1175000, health:58867, pension:96000}, {min:1235000, health:61786, pension:99000},
    {min:1295000, health:64705, pension:102000}, {min:1355000, health:67624, pension:105000}
];

function initGradeSelect() {
    const sel = document.getElementById("grade");
    TABLE.forEach((item, index) => {
        const opt = document.createElement("option");
        opt.value = index;
        opt.textContent = `等級${index + 1} (報酬目安: ${item.min.toLocaleString()}〜)`;
        sel.appendChild(opt);
    });
}

function getGrade(gross){
    for(let i=TABLE.length-1;i>=0;i--){
        if(gross>=TABLE[i].min) return TABLE[i];
    }
    return TABLE[0];
}

function calc(){
    const base = parseFloat(document.getElementById("baseSalary").value) || 0;
    const sched = parseFloat(document.getElementById("scheduledHours").value) || 0;
    if(base === 0 || sched === 0) return;

    const hourly = base / sched;
    let ot = 0;
    document.querySelectorAll(".t").forEach(i=>{
        if(!i.value) return;
        const [h,m] = i.value.split(":").map(Number);
        const end = h * 60 + m;
        if(end > 1080) ot += (end - 1080);
    });

    const otPay = hourly * 1.25 * ot / 60;
    const gross = base + otPay;
    
    const gradeVal = document.getElementById("grade").value;
    const grade = (gradeVal === "auto") ? getGrade(gross) : TABLE[gradeVal];

    const health = grade.health;
    const pension = grade.pension;
    const employment = Math.round(gross * 0.006);
    const social = health + pension + employment;
    const income = Math.round(gross * 0.035 / 12);
    const resident = parseFloat(document.getElementById("residentTax").value) || 0;
    const net = gross - social - income - resident;

    document.getElementById("hourly").textContent = Math.round(hourly);
    document.getElementById("otTime").textContent = `${Math.floor(ot/60)}h${ot%60}m`;
    document.getElementById("otPay").textContent = Math.round(otPay);
    document.getElementById("gross").textContent = Math.round(gross);
    document.getElementById("health").textContent = Math.round(health);
    document.getElementById("pension").textContent = Math.round(pension);
    document.getElementById("employment").textContent = employment;
    document.getElementById("social").textContent = social;
    document.getElementById("income").textContent = income;
    document.getElementById("resident").textContent = resident;
    document.getElementById("net").textContent = Math.round(net);
}

function generateTable(){
    const y=2026, m=6;
    const start=new Date(y,m-1,21), end=new Date(y,m,20);
    const workTable = document.getElementById("workTable");
    workTable.innerHTML="";
    for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
        const tr=document.createElement("tr");
        const w=d.getDay();
        if(w===0||w===6) tr.classList.add("weekend");
        tr.innerHTML=`<td>${d.getMonth()+1}/${d.getDate()}</td><td>${["日","月","火","水","木","金","土"][w]}</td><td><input type="time" class="t"></td>`;
        workTable.appendChild(tr);
    }
    document.querySelectorAll(".t").forEach(i=>i.oninput=calc);
}

initGradeSelect();
document.getElementById("baseSalary").oninput = calc;
document.getElementById("scheduledHours").oninput = calc;
document.getElementById("residentTax").oninput = calc;
document.getElementById("grade").onchange = calc;
generateTable();
</script>
</body>
</html>
