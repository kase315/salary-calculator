<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給与見込み計算</title>

<style>
body {
    font-family: sans-serif;
    max-width: 900px;
    margin: 20px auto;
    padding: 10px;
    background: #f5f5f5;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

input, select {
    padding: 8px;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

.weekend {
    background: #eee;
}

.summary div {
    margin: 8px 0;
}

@media (max-width: 600px) {
    table {
        font-size: 12px;
    }

    input[type="time"] {
        width: 110px;
    }
}
</style>
</head>

<body>

<h1>給与見込み計算</h1>

<div class="card">
    <label>支給年</label>
    <select id="payYear"></select>

    <label>支給月</label>
    <select id="payMonth"></select>

    <br>

    <label>基本給</label>
    <input type="number" id="baseSalary">

    <label>所定労働時間</label>
    <input type="number" id="scheduledHours">

    <button onclick="generateTable()">勤務表生成</button>

    <p id="period"></p>
</div>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>日付</th>
                <th>曜日</th>
                <th>退勤</th>
            </tr>
        </thead>

        <tbody id="workTable"></tbody>
    </table>
</div>

<div class="card summary">

    <div>時間単価：
        <span id="hourlyRate">0</span>円
    </div>

    <div>割増なし時間：
        <span id="normalTime">0時間0分</span>
    </div>

    <div>割増なし残業代：
        <span id="normalPay">0</span>円
    </div>

    <div>割増時間：
        <span id="overtimeTime">0時間0分</span>
    </div>

    <div>割増残業代：
        <span id="overtimePay">0</span>円
    </div>

    <hr>

    <div>総残業代：
        <span id="totalPay">0</span>円
    </div>

    <h2>
        額面給与：
        <span id="grossSalary">0</span>円
    </h2>

</div>

<div class="card">

    <h3>シミュレーション</h3>

    <label>追加残業時間（時間）</label>
    <input type="range" id="extraOvertime" min="0" max="50" value="0">

    <span id="extraOvertimeLabel">0時間</span>

</div>

<div class="card">

    <h3>税金内訳</h3>

    <div>所得税：
        <span id="incomeTax">0</span>円
    </div>

    <div>社会保険：
        <span id="socialInsurance">0</span>円
    </div>

    <div>
        住民税：
        <input type="number" id="residentTax" value="0">
        円
    </div>

</div>

<div class="card summary">

    <div>手取り（概算）：
        <span id="netSalary">0</span>円
    </div>

</div>

<script>

const WEEKDAYS = ['日','月','火','水','木','金','土'];

function initSelectors() {

    const yearSelect = document.getElementById('payYear');
    const monthSelect = document.getElementById('payMonth');

    const currentYear = new Date().getFullYear();

    for (let y = currentYear - 1; y <= currentYear + 1; y++) {
        yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
    }

    for (let m = 1; m <= 12; m++) {
        monthSelect.innerHTML += `<option value="${m}">${m}</option>`;
    }

    yearSelect.value = currentYear;
    monthSelect.value = new Date().getMonth() + 1;
}

function generateTable() {

    const payYear = Number(document.getElementById('payYear').value);
    const payMonth = Number(document.getElementById('payMonth').value);

    const startDate = new Date(payYear, payMonth - 3, 21);
    const endDate = new Date(payYear, payMonth - 2, 20);

    document.getElementById('period').textContent =
        `対象期間：${formatDate(startDate)} ～ ${formatDate(endDate)}`;

    const tbody = document.getElementById('workTable');
    tbody.innerHTML = '';

    let current = new Date(startDate);

    while (current <= endDate) {

        const tr = document.createElement('tr');
        const weekday = current.getDay();

        if (weekday === 0 || weekday === 6) {
            tr.classList.add('weekend');
        }

        const key = formatDate(current);

        tr.innerHTML = `
            <td>${key}</td>
            <td>${WEEKDAYS[weekday]}</td>
            <td>
                <input type="time" class="endTime" data-date="${key}">
            </td>
        `;

        tbody.appendChild(tr);
        current.setDate(current.getDate() + 1);
    }

    loadData();

    document.querySelectorAll('.endTime').forEach(input => {
        input.addEventListener('change', () => {
            calculate();
            saveData();
        });
    });

    calculate();
}

function formatDate(date) {
    return `${date.getMonth() + 1}/${date.getDate()}`;
}

function getSocialInsurance(grossSalary) {
    const health = grossSalary * 0.049;
    const pension = grossSalary * 0.0915;
    const employment = grossSalary * 0.003;
    return health + pension + employment;
}

function calculateWithExtra(hourlyRate, extraHours) {
    return hourlyRate * extraHours * 1.25;
}

function calculate() {

    const baseSalary = Number(document.getElementById('baseSalary').value);
    const scheduledHours = Number(document.getElementById('scheduledHours').value);

    if (!baseSalary || !scheduledHours) return;

    const hourlyRate = baseSalary / scheduledHours;

    let normalMinutes = 0;
    let overtimeMinutes = 0;

    document.querySelectorAll('.endTime').forEach(input => {

        if (!input.value) return;

        const [hour, minute] = input.value.split(':').map(Number);
        const end = hour * 60 + minute;

        const normalStart = 17 * 60 + 45;
        const overtimeStart = 18 * 60;

        if (end > normalStart) {
            normalMinutes += Math.min(end, overtimeStart) - normalStart;
        }

        if (end > overtimeStart) {
            overtimeMinutes += end - overtimeStart;
        }
    });

    const normalPay = hourlyRate * (normalMinutes / 60);
    const overtimePay = hourlyRate * 1.25 * (overtimeMinutes / 60);
    const totalPay = normalPay + overtimePay;
    const grossSalary = baseSalary + totalPay;

    const extraHours = Number(document.getElementById('extraOvertime').value);
    const extraPay = calculateWithExtra(hourlyRate, extraHours);

    const finalGrossSalary = grossSalary + extraPay;

    const residentTax = Number(document.getElementById('residentTax').value || 0);

    const socialInsurance = getSocialInsurance(finalGrossSalary);
    const incomeTax = finalGrossSalary * 0.1;

    const netSalary =
        finalGrossSalary - socialInsurance - incomeTax - residentTax;

    document.getElementById('hourlyRate').textContent = Math.round(hourlyRate).toLocaleString();
    document.getElementById('normalTime').textContent = `${Math.floor(normalMinutes / 60)}時間${normalMinutes % 60}分`;
    document.getElementById('normalPay').textContent = Math.round(normalPay).toLocaleString();
    document.getElementById('overtimeTime').textContent = `${Math.floor(overtimeMinutes / 60)}時間${overtimeMinutes % 60}分`;
    document.getElementById('overtimePay').textContent = Math.round(overtimePay).toLocaleString();
    document.getElementById('totalPay').textContent = Math.round(totalPay).toLocaleString();
    document.getElementById('grossSalary').textContent = Math.round(finalGrossSalary).toLocaleString();

    document.getElementById('incomeTax').textContent = Math.round(incomeTax).toLocaleString();
    document.getElementById('socialInsurance').textContent = Math.round(socialInsurance).toLocaleString();

    document.getElementById('netSalary').textContent = Math.round(netSalary).toLocaleString();
}

function saveData() {

    const key = `salary_${document.getElementById('payYear').value}_${document.getElementById('payMonth').value}`;

    const data = {
        baseSalary: document.getElementById('baseSalary').value,
        scheduledHours: document.getElementById('scheduledHours').value,
        times: {}
    };

    document.querySelectorAll('.endTime').forEach(input => {
        data.times[input.dataset.date] = input.value;
    });

    localStorage.setItem(key, JSON.stringify(data));
}

function loadData() {

    const key = `salary_${document.getElementById('payYear').value}_${document.getElementById('payMonth').value}`;

    const saved = localStorage.getItem(key);
    if (!saved) return;

    const data = JSON.parse(saved);

    document.getElementById('baseSalary').value = data.baseSalary || '';
    document.getElementById('scheduledHours').value = data.scheduledHours || '';

    document.querySelectorAll('.endTime').forEach(input => {
        input.value = data.times[input.dataset.date] || '';
    });
}

document.getElementById('baseSalary').addEventListener('input', () => {
    calculate();
    saveData();
});

document.getElementById('scheduledHours').addEventListener('input', () => {
    calculate();
    saveData();
});

document.getElementById('payYear').addEventListener('change', generateTable);
document.getElementById('payMonth').addEventListener('change', generateTable);

document.getElementById('extraOvertime').addEventListener('input', (e) => {
    document.getElementById('extraOvertimeLabel').textContent = `${e.target.value}時間`;
    calculate();
});

document.getElementById('residentTax').addEventListener('input', calculate);

initSelectors();
generateTable();

</script>

</body>
</html>
