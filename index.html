<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給与見込み計算</title>

<style>
body{
font-family:sans-serif;
max-width:900px;
margin:20px auto;
padding:10px;
background:#f5f5f5;
}
.card{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}
input,select{
padding:8px;
margin:5px;
}
table{
width:100%;
border-collapse:collapse;
}
th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}
.weekend{background:#eee;}
</style>
</head>

<body>

<h1>給与見込み計算</h1>

<div class="card">
<label>基本給</label>
<input type="number" id="baseSalary">

<label>所定労働時間</label>
<input type="number" id="scheduledHours">

<button onclick="generateTable()">勤務表生成</button>
</div>

<div class="card">
<table>
<thead>
<tr><th>日付</th><th>曜日</th><th>退勤</th></tr>
</thead>
<tbody id="workTable"></tbody>
</table>
</div>

<div class="card">
<label>住民税（月）</label>
<input type="number" id="residentTax" value="0">

<label>等級</label>
<select id="grade"></select>
</div>

<div class="card">

<div>時間単価：<span id="hourly">0</span></div>

<div>残業時間：<span id="otTime">0</span></div>

<div>残業代：<span id="otPay">0</span></div>

<hr>

<div>額面：<span id="gross">0</span></div>

<hr>

<div>健康保険：<span id="health">0</span></div>
<div>厚生年金：<span id="pension">0</span></div>
<div>雇用保険：<span id="employment">0</span></div>
<div>社保合計：<span id="social">0</span></div>

<div>所得税：<span id="income">0</span></div>
<div>住民税：<span id="resident">0</span></div>

<h2>手取り：<span id="net">0</span></h2>

</div>

<script>

const TABLE=[
{min:58000,health:2822,pension:8052},
{min:63000,health:3308,pension:8967},
{min:73000,health:3794,pension:9516},
{min:83000,health:4281,pension:10065},
{min:93000,health:4767,pension:10797},
{min:101000,health:5059,pension:11529},
{min:107000,health:5351,pension:12261},
{min:114000,health:5740,pension:12993},
{min:122000,health:6130,pension:13725},
{min:130000,health:6519,pension:14640},
{min:138000,health:6908,pension:15555},
{min:146000,health:7297,pension:16470},
{min:155000,health:7784,pension:17385},
{min:165000,health:8271,pension:18300},
{min:175000,health:8757,pension:20130},
{min:185000,health:9243,pension:21960},
{min:195000,health:9730,pension:23790},
{min:210000,health:10703,pension:25320},
{min:230000,health:11676,pension:27600},
{min:250000,health:12649,pension:29900},
{min:270000,health:13622,pension:32200},
{min:290000,health:14595,pension:34500},
{min:310000,health:15568,pension:36800},
{min:330000,health:16541,pension:39100},
{min:350000,health:17514,pension:41400},
{min:370000,health:18487,pension:43700},
{min:395000,health:19946,pension:47500},
{min:425000,health:21406,pension:50600},
{min:455000,health:22865,pension:54050},
{min:485000,health:24325,pension:57500},
{min:515000,health:25784,pension:60950},
{min:545000,health:27244,pension:64400},
{min:575000,health:28703,pension:67850},
{min:605000,health:30163,pension:71300},
{min:635000,health:31622,pension:74750}
];

const el=id=>document.getElementById(id);

function getGrade(gross){
for(let i=TABLE.length-1;i>=0;i--){
if(gross>=TABLE[i].min)return TABLE[i];
}
return TABLE[0];
}

function generateTable(){

const y=2026;
const m=6;

const start=new Date(y,m-3,21);
const end=new Date(y,m-2,20);

workTable.innerHTML="";

let d=new Date(start);

while(d<=end){

const tr=document.createElement("tr");
const w=d.getDay();

if(w===0||w===6)tr.classList.add("weekend");

tr.innerHTML=`
<td>${d.getMonth()+1}/${d.getDate()}</td>
<td>${["日","月","火","水","木","金","土"][w]}</td>
<td><input type="time" class="t"></td>
`;

workTable.appendChild(tr);
d.setDate(d.getDate()+1);
}

document.querySelectorAll(".t").forEach(i=>i.oninput=calc);

calc();
}

function calc(){

const base=+baseSalary.value;
const sched=+scheduledHours.value;
if(!base||!sched)return;

const hourly=base/sched;

let ot=0;

document.querySelectorAll(".t").forEach(i=>{
if(!i.value)return;
const [h,m]=i.value.split(":").map(Number);
const end=h*60+m;
if(end>1080)ot+=end-1080;
});

const otPay=hourly*1.25*ot/60;
const gross=base+otPay;

/* 社保 */
const grade=getGrade(gross);

const health=grade.health;
const pension=grade.pension;
const employment=gross*0.006;

const social=health+pension+employment;

/* 税 */
const income=Math.round(gross*0.035/12);
const resident=+residentTax.value;

/* 手取り */
const net=gross-social-income-resident;

/* 表示 */
hourlyEl.textContent=Math.round(hourly);
otTimeEl.textContent=`${Math.floor(ot/60)}h${ot%60}m`;
otPayEl.textContent=Math.round(otPay);

grossEl.textContent=Math.round(gross);

healthEl.textContent=Math.round(health);
pensionEl.textContent=Math.round(pension);
employmentEl.textContent=Math.round(employment);
socialEl.textContent=Math.round(social);

incomeEl.textContent=Math.round(income);
residentEl.textContent=resident;
netEl.textContent=Math.round(net);
}

/* init */
const baseSalary=el("baseSalary");
const scheduledHours=el("scheduledHours");

const hourlyEl=el("hourly");
const otTimeEl=el("otTime");
const otPayEl=el("otPay");

const grossEl=el("gross");

const healthEl=el("health");
const pensionEl=el("pension");
const employmentEl=el("employment");
const socialEl=el("social");

const incomeEl=el("income");
const residentEl=el("resident");

const netEl=el("net");

baseSalary.oninput=calc;
scheduledHours.oninput=calc;
residentTax.oninput=calc;

generateTable();

</script>

</body>
</html>
