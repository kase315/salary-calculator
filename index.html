<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給与見込み計算</title>

<style>
body {
    font-family: sans-serif;
    max-width: 900px;
    margin: 20px auto;
    padding: 10px;
    background: #f5f5f5;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

input, select {
    padding: 8px;
    margin: 5px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

.weekend {
    background: #eee;
}

.summary div {
    margin: 8px 0;
}
</style>
</head>

<body>

<h1>給与見込み計算</h1>

<div class="card">
    <label>支給年</label>
    <select id="payYear"></select>

    <label>支給月</label>
    <select id="payMonth"></select>

    <br>

    <label>基本給</label>
    <input type="number" id="baseSalary">

    <label>所定労働時間</label>
    <input type="number" id="scheduledHours">

    <button onclick="generateTable()">勤務表生成</button>

    <p id="period"></p>
</div>

<div class="card">
    <table>
        <thead>
        <tr>
            <th>日付</th>
            <th>曜日</th>
            <th>退勤</th>
        </tr>
        </thead>
        <tbody id="workTable"></tbody>
    </table>
</div>

<div class="card summary">
    <div>時間単価：<span id="hourlyRate">0</span>円</div>
    <div>残業代：<span id="overtimePay">0</span>円</div>
    <div>額面：<span id="grossSalary">0</span>円</div>
</div>

<div class="card">
    <div>所得税：<span id="incomeTax">0</span>円</div>

    <div>
        住民税：
        <input type="number" id="residentTax" value="0">
    </div>

    <div>
        社会保険：
        <select id="socialSelect">
            <option value="0">選択</option>
            <option value="2821.7">63,000</option>
            <option value="3308.2">73,000</option>
            <option value="3794.7">83,000</option>
            <option value="4281.2">93,000</option>
            <option value="4767.7">101,000</option>
            <option value="5059.6">107,000</option>
            <option value="5351.5">114,000</option>
            <option value="5740.7">122,000</option>
            <option value="6129.9">130,000</option>
            <option value="6519.1">138,000</option>
            <option value="6908.3">146,000</option>
            <option value="7297.5">155,000</option>
            <option value="7784.0">165,000</option>
            <option value="8270.5">175,000</option>
            <option value="8757.0">185,000</option>
            <option value="9243.5">195,000</option>
            <option value="9730.0">210,000</option>
            <option value="10703.0">230,000</option>
            <option value="11676.0">250,000</option>
            <option value="12649.0">270,000</option>
            <option value="14595.0">290,000</option>
            <option value="16541.0">330,000</option>
            <option value="18487.0">395,000</option>
        </select>
    </div>
</div>

<div class="card summary">
    <h2>手取り：<span id="netSalary">0</span>円</h2>
</div>

<script>

const WEEKDAYS = ['日','月','火','水','木','金','土'];

function initSelectors() {

    const y = document.getElementById('payYear');
    const m = document.getElementById('payMonth');

    const now = new Date().getFullYear();

    for (let i = now - 1; i <= now + 1; i++) {
        y.innerHTML += `<option value="${i}">${i}</option>`;
    }

    for (let i = 1; i <= 12; i++) {
        m.innerHTML += `<option value="${i}">${i}</option>`;
    }

    y.value = now;
    m.value = new Date().getMonth() + 1;
}

function generateTable() {

    const year = Number(document.getElementById('payYear').value);
    const month = Number(document.getElementById('payMonth').value);

    const start = new Date(year, month - 3, 21);
    const end = new Date(year, month - 2, 20);

    const tbody = document.getElementById('workTable');
    tbody.innerHTML = '';

    let d = new Date(start);

    while (d <= end) {

        const tr = document.createElement('tr');

        if (d.getDay() === 0 || d.getDay() === 6) {
            tr.classList.add('weekend');
        }

        tr.innerHTML = `
            <td>${d.getMonth()+1}/${d.getDate()}</td>
            <td>${WEEKDAYS[d.getDay()]}</td>
            <td><input type="time" class="endTime"></td>
        `;

        tbody.appendChild(tr);
        d.setDate(d.getDate() + 1);
    }

    document.querySelectorAll('.endTime')
        .forEach(i => i.addEventListener('input', calculate));

    calculate();
}

function salaryDeduction(annual) {

    if (annual <= 1625000) return 550000;
    if (annual <= 1800000) return annual * 0.4 - 100000;
    if (annual <= 3600000) return annual * 0.3 + 80000;
    if (annual <= 6600000) return annual * 0.2 + 440000;
    if (annual <= 8500000) return annual * 0.1 + 1100000;

    return 1950000;
}

function incomeTaxMonthly(grossMonthly) {

    const annual = grossMonthly * 12;
    const taxable = Math.max(0, annual - salaryDeduction(annual));

    let tax;

    if (taxable <= 1950000) tax = taxable * 0.03;
    else if (taxable <= 3300000) tax = taxable * 0.05 - 40000;
    else if (taxable <= 6950000) tax = taxable * 0.10 - 120000;
    else tax = taxable * 0.12 - 200000;

    return Math.max(0, tax / 12);
}

function getSocial() {
    return Number(document.getElementById('socialSelect').value || 0);
}

function calculate() {

    const base = Number(document.getElementById('baseSalary').value);
    const hours = Number(document.getElementById('scheduledHours').value);

    if (!base || !hours) return;

    const hourly = base / hours;

    let overtimeMin = 0;

    document.querySelectorAll('.endTime').forEach(i => {

        if (!i.value) return;

        const [h,m] = i.value.split(':').map(Number);
        const end = h*60+m;

        const otStart = 18*60;

        if (end > otStart) {
            overtimeMin += end - otStart;
        }
    });

    const overtimePay = hourly * 1.25 * (overtimeMin/60);

    const gross = base + overtimePay;

    const social = getSocial();
    const resident = Number(document.getElementById('residentTax').value || 0);
    const incomeTax = incomeTaxMonthly(gross);

    const net = gross - social - resident - incomeTax;

    document.getElementById('hourlyRate').textContent = Math.round(hourly);
    document.getElementById('overtimePay').textContent = Math.round(overtimePay);
    document.getElementById('grossSalary').textContent = Math.round(gross);

    document.getElementById('incomeTax').textContent = Math.round(incomeTax);
    document.getElementById('netSalary').textContent = Math.round(net);
}

document.getElementById('baseSalary').addEventListener('input', calculate);
document.getElementById('scheduledHours').addEventListener('input', calculate);
document.getElementById('residentTax').addEventListener('input', calculate);
document.getElementById('socialSelect').addEventListener('change', calculate);

initSelectors();
generateTable();

</script>

</body>
</html>
