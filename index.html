<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給与見込み計算（目標達成表示版）</title>
<style>
body{font-family:sans-serif;max-width:900px;margin:20px auto;padding:10px;background:#f5f5f5;}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;}
input,select,button{padding:8px;margin:5px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:8px;text-align:center;}
.weekend{background:#eee;}
.goal-item{margin:5px 0; font-size: 0.9em; color: #333;}
</style>
</head>
<body>

<h1>給与見込み計算</h1>

<div class="card">
<label>給与支給月</label>
<select id="payYear"></select>年
<select id="payMonth"></select>月支給分
<button onclick="resetData()">勤務表リセット</button>
<button onclick="saveTimes()" style="background:#4CAF50; color:white; border:none; cursor:pointer;">退勤時間を保存</button>
<br>
<label>基本給</label>
<input type="number" id="baseSalary">
<label>所定労働時間</label>
<input type="number" id="scheduledHours">
</div>

<div class="card">
<div id="periodLabel" style="font-weight:bold; margin-bottom:10px;"></div>
<table>
<thead><tr><th>日付</th><th>曜日</th><th>退勤</th></tr></thead>
<tbody id="workTable"></tbody>
</table>
</div>

<div class="card">
<label>住民税（月）</label>
<input type="number" id="residentTax" value="0">
<br>
<label>交通費（月）</label>
<input type="number" id="transportation" value="0" oninput="calc()">
<br>
<label>等級選択</label>
<select id="grade">
    <option value="auto">自動計算</option>
</select>
</div>

<div class="card">
<div>時間単価：<span id="hourly">0</span></div>
<div>残業時間（普通）：<span id="otTime10">0</span></div>
<div>残業時間（割増）：<span id="otTime125">0</span></div>
<div>残業代：<span id="otPay">0</span></div>
<hr>
<div>額面：<span id="gross">0</span></div>
<hr>
<div>健康保険（折半）：<span id="health">0</span></div>
<div>厚生年金（折半）：<span id="pension">0</span></div>
<div>子ども拠出金（折半）：<span id="child">0</span></div>
<div>雇用保険：<span id="employment">0</span></div>
<div>社保合計：<span id="social">0</span></div>
<div>所得税：<span id="income">0</span></div>
<div>住民税：<span id="resident">0</span></div>
<h2>手取り：<span id="net">0</span></h2>
<hr>
<h3>目標達成までの残り残業</h3>
<div id="goals"></div>
</div>

<script>
const TABLE = [
    {min:58000, h:2821.7, p:0, c:66.7},     {min:68000, h:3308.2, p:0, c:78.2},     {min:78000, h:3794.7, p:0, c:89.7},
    {min:88000, h:4281.2, p:8052, c:101.2}, {min:98000, h:4767.7, p:8967, c:112.7}, {min:104000, h:5059.6, p:9516, c:119.6},
    {min:110000, h:5351.5, p:10065, c:126.5}, {min:118000, h:5740.7, p:10797, c:135.7}, {min:126000, h:6129.9, p:11529, c:144.9},
    {min:134000, h:6519.1, p:12261, c:154.1}, {min:142000, h:6908.3, p:12993, c:163.3}, {min:150000, h:7297.5, p:13725, c:172.5},
    {min:160000, h:7784.0, p:14640, c:184.0}, {min:170000, h:8270.5, p:15555, c:195.5}, {min:180000, h:8757.0, p:16470, c:207.0},
    {min:190000, h:9243.5, p:17385, c:218.5}, {min:200000, h:9730.0, p:18300, c:230.0}, {min:220000, h:10703.0, p:20130, c:253.0},
    {min:240000, h:11676.0, p:21960, c:276.0}, {min:260000, h:12649.0, p:23790, c:299.0}, {min:280000, h:13622.0, p:25620, c:322.0},
    {min:300000, h:14595.0, p:27450, c:345.0}, {min:320000, h:15568.0, p:29280, c:368.0}, {min:340000, h:16541.0, p:31110, c:391.0},
    {min:360000, h:17514.0, p:32940, c:414.0}, {min:380000, h:18487.0, p:34770, c:437.0}, {min:410000, h:19946.5, p:37515, c:471.5},
    {min:440000, h:21406.0, p:40260, c:506.0}, {min:470000, h:22865.5, p:43005, c:540.5}, {min:500000, h:24325.0, p:45750, c:575.0},
    {min:530000, h:25784.5, p:48495, c:609.5}, {min:560000, h:27244.0, p:51240, c:644.0}
];

function init(){
    const ySel = document.getElementById("payYear");
    const mSel = document.getElementById("payMonth");
    const now = new Date();
    for(let i=0; i<3; i++) ySel.innerHTML += `<option>${now.getFullYear()+i}</option>`;
    for(let i=1; i<=12; i++) mSel.innerHTML += `<option>${i}</option>`;
    mSel.value = now.getMonth()+1;
    TABLE.forEach((item, index) => document.getElementById("grade").innerHTML += `<option value="${index}">等級${index + 1} (目安:${item.min.toLocaleString()}〜)</option>`);
    [ySel, mSel, document.getElementById("baseSalary"), document.getElementById("scheduledHours"), document.getElementById("residentTax"), document.getElementById("grade")].forEach(el => el.onchange = generateTable);
    generateTable();
}

function getGrade(gross){
    for(let i=TABLE.length-1; i>=0; i--) if(gross >= TABLE[i].min) return TABLE[i];
    return TABLE[0];
}

function getIncomeTax(annualGross, annualSocial) {
    let deduction = 0;
    if (annualGross <= 1900000) deduction = 650000;
    else if (annualGross <= 3600000) deduction = annualGross * 0.3 + 80000;
    else if (annualGross <= 6600000) deduction = annualGross * 0.2 + 440000;
    else if (annualGross <= 8500000) deduction = annualGross * 0.1 + 1100000;
    else deduction = 1950000;
    const taxable = Math.max(0, annualGross - deduction - 480000 - annualSocial);
    return Math.floor((taxable * 0.05) / 12);
}

function saveTimes() {
    const times = {};
    document.querySelectorAll('.t').forEach(input => times[input.id] = input.value);
    localStorage.setItem('savedTimes', JSON.stringify(times));
    alert('保存しました');
}

function resetData() { localStorage.removeItem('savedTimes'); generateTable(); }

function generateTable(){
    const y = +document.getElementById("payYear").value;
    const m = +document.getElementById("payMonth").value;
    const start = new Date(y, m-3, 21);
    const end = new Date(y, m-2, 20);
    document.getElementById("periodLabel").textContent = `計算対象期間：${start.getMonth()+1}/${start.getDate()} ～ ${end.getMonth()+1}/${end.getDate()}`;
    const saved = JSON.parse(localStorage.getItem('savedTimes') || '{}');
    const tbody = document.getElementById("workTable");
    tbody.innerHTML = "";
    for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
        const tr = document.createElement("tr");
        if(d.getDay()===0 || d.getDay()===6) tr.classList.add("weekend");
        const id = `t_${d.getMonth()+1}_${d.getDate()}`;
        tr.innerHTML = `<td>${d.getMonth()+1}/${d.getDate()}</td><td>${["日","月","火","水","木","金","土"][d.getDay()]}</td><td><input type="time" class="t" id="${id}" value="${saved[id] || ''}" oninput="calc()"></td>`;
        tbody.appendChild(tr);
    }
    calc();
}

function calc(){
    const base = +document.getElementById("baseSalary").value || 0;
    const sched = +document.getElementById("scheduledHours").value || 0;
    if(!base || !sched) return;

    let ot10 = 0; let ot125 = 0;
    document.querySelectorAll(".t").forEach(i => {
        if(i.value){
            const [h,m] = i.value.split(":").map(Number);
            const time = h * 60 + m;
            if(time > 1065) {
                ot10 += Math.min(time, 1080) - 1065;
                if(time > 1080) ot125 += (time - 1080);
            }
        }
    });

    const hourly = base / sched;
    const currentNet = Math.round(base + (hourly * ot10/60) + (hourly * 1.25 * ot125/60) - Math.round(getGrade(base).h + getGrade(base).p + getGrade(base).c + (base * 0.006)) - getIncomeTax(base*12, (getGrade(base).h + getGrade(base).p + getGrade(base).c + (base*0.006))*12) - (+document.getElementById("residentTax").value || 0) - 300) + (+document.getElementById("transportation").value || 0);

    // 目標達成表示
    const goalsDiv = document.getElementById("goals");
    goalsDiv.innerHTML = "";
    [200000, 210000, 220000].forEach(target => {
        let needed = target - currentNet;
        if(needed <= 0) {
            goalsDiv.innerHTML += `<div class="goal-item">手取り${(target/10000)}万円：達成済み！</div>`;
        } else {
            let neededMin = Math.ceil(needed / (hourly / 60)); 
            goalsDiv.innerHTML += `<div class="goal-item">手取り${(target/10000)}万円まで：あと約 ${neededMin} 分</div>`;
        }
    });

    // UI更新
    document.getElementById("hourly").textContent = Math.round(hourly);
    document.getElementById("otTime10").textContent = `${Math.floor(ot10/60)}h${ot10%60}m`;
    document.getElementById("otTime125").textContent = `${Math.floor(ot125/60)}h${ot125%60}m`;
    document.getElementById("otPay").textContent = Math.round((hourly * ot10 / 60) + (hourly * 1.25 * ot125 / 60));
    document.getElementById("gross").textContent = Math.round(base + (hourly * ot10 / 60) + (hourly * 1.25 * ot125 / 60));
    document.getElementById("health").textContent = Math.round(getGrade(base).h);
    document.getElementById("pension").textContent = Math.round(getGrade(base).p);
    document.getElementById("child").textContent = Math.round(getGrade(base).c);
    document.getElementById("employment").textContent = Math.round((base + (hourly * ot10 / 60) + (hourly * 1.25 * ot125 / 60)) * 0.006);
    document.getElementById("social").textContent = Math.round(getGrade(base).h + getGrade(base).p + getGrade(base).c + ((base + (hourly * ot10 / 60) + (hourly * 1.25 * ot125 / 60)) * 0.006));
    document.getElementById("income").textContent = getIncomeTax((base + (hourly * ot10 / 60) + (hourly * 1.25 * ot125 / 60)) * 12, (getGrade(base).h + getGrade(base).p + getGrade(base).c + (base*0.006))*12);
    document.getElementById("resident").textContent = document.getElementById("residentTax").value;
    document.getElementById("net").textContent = currentNet;
}
init();
</script>
</body>
</html>
